services:
  postgres:
    image: postgres:16-alpine
    container_name: metacoding_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metacoding_db
      POSTGRES_USER: metacoding
      POSTGRES_PASSWORD: metacoding_pass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metacoding -d metacoding_db"]
      interval: 5s
      timeout: 5s
      retries: 10
